<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модальное окно с прогресс-баром</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="first-task">
    <div class="logo1">
        <h1>Logo1</h1>
        <div class="bbs-logo">
            <p class="letters">B</p>
            <p class="letters">B</p>
            <p class="letters">C</p>
        </div>
    </div>
    <div class="logo2">
        <h1>Logo2</h1>
        <div class="mitsubishi-logo">
            <div class="diamond top"></div>
            <div class="diamond left"></div>
            <div class="diamond right"></div>
        </div>
    </div>
</div>

<button class="open-btn" id="openModalBtn">Открыть модальное окно</button>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="close" id="closeModalBtn">&times;</button>
        <h2 class="loading-text">Загрузка данных</h2>
        <div class="progress-bar" style="display: flex;">
            <div class="progress-fill"></div>
            <div class="text">Loading...</div>
            <div class="text text-white">Loading...</div>
        </div>
        <div class="accordion" style="display: none;">
            <div class="accordion-item">
                <input type="checkbox" id="acc1">
                <label for="acc1" class="accordion-header">Вкладочка 1</label>
                <div class="accordion-content">
                    <p>которая говорит привет</p>
                </div>
            </div>

            <div class="accordion-item">
                <input type="checkbox" id="acc2">
                <label for="acc2" class="accordion-header">Вкладочка 2</label>
                <div class="accordion-content">
                    <p>которая улыбается и машет</p>
                </div>
            </div>

            <div class="accordion-item">
                <input type="checkbox" id="acc3">
                <label for="acc3" class="accordion-header">Вкладочка 3</label>
                <div class="accordion-content">
                    <p>которая прощается</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
