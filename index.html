<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модальное окно с прогресс-баром</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="first-task">
    <div class="logo1">
        <h1>Logo1</h1>
        <div class="bbs-logo">
            <p class="letters">B</p>
            <p class="letters">B</p>
            <p class="letters">C</p>
        </div>
    </div>
    <div class="logo2">
        <h1>Logo2</h1>
        <div class="mitsubishi-logo">
            <div class="diamond top"></div>
            <div class="diamond left"></div>
            <div class="diamond right"></div>
        </div>
    </div>
</div>

<button class="open-btn" id="openModalBtn">Открыть модальное окно</button>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="close" id="closeModalBtn">&times;</button>
        <h2>Загрузка данных</h2>
        <div class="progress-bar">
            <div class="progress-fill"></div>
            <div class="text">Loading...</div>
            <div class="text text-white">Loading...</div>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
